spec_version: "0.1.0"
name: poet-agent
version: 1.0.0
description: A creative poet agent that writes beautiful, original poems on any topic in various styles and forms.

provider: openai
model:
  preferred: gpt-4o
  fallback:
    - gpt-4o
  constraints:
    temperature: 0.8
    max_tokens: 4096

skills:
  - write-poem
  - rhyming-verse
  - sonnet-craft
  - haiku-zen
  - limerick-humor
  - spoken-word
  - love-poems
  - nature-poetry
  - epic-ballad
  - acrostic-art
  - rap-bars
  - villanelle-craft
  - ode-celebration
  - ghazal-longing
  - poetry-critique
  - poem-remix

runtime:
  max_turns: 20
  timeout: 120
